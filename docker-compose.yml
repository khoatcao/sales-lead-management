services:
  # ── Application ────────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_leads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      app_net:
        ipv4_address: 172.5.0.10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/sales_leads
      OTEL_ENDPOINT: http://otel-collector:4317
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --http h11
    networks:
      app_net:
        ipv4_address: 172.5.0.11

  # ── Observability ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki
    networks:
      app_net:
        ipv4_address: 172.5.0.12

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      app_net:
        ipv4_address: 172.5.0.13

  loki:
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      app_net:
        ipv4_address: 172.5.0.14

  tempo:
    image: grafana/tempo:2.6.1
    ports:
      - "3200:3200"
      - "4317"
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yaml
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      app_net:
        ipv4_address: 172.5.0.15

  grafana:
    image: grafana/grafana:11.3.0
    network_mode: host
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_SECURITY_DATA_SOURCE_PROXY_WHITELIST=127.0.0.1:19090 127.0.0.1:3100 127.0.0.1:3200
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    networks:
      app_net:
        ipv4_address: 172.5.0.17

volumes:
  postgres_data:
  grafana_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.5.0.0/24
