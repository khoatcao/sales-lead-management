name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Code Quality ────────────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Format check with Black
        run: poetry run black --check app/ tests/

      - name: Import order check with isort
        run: poetry run isort --check-only app/ tests/

      - name: Lint with Flake8
        run: poetry run flake8 app/ tests/

      - name: Type check with Mypy
        run: poetry run mypy app/

  # ── Job 2: Tests ───────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://placeholder:placeholder@localhost:5432/sales_leads
          OPENAI_API_KEY: placeholder
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: test
        run: poetry run pytest tests/test_ai_unit.py --cov=app --cov-report=xml -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Job 3: Build Docker Image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sales-lead-management:${{ github.sha }} ./backend

  # ── Job 4: Frontend Lint ───────────────────────────────────────────────────
  fe-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  # ── Job 5: Frontend Build ──────────────────────────────────────────────────
  fe-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: fe-lint
    defaults:
      run:
        working-directory: fe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-dist
          path: fe/dist
